spring:
  application:
    name: job-service

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        acknowledge-mode: auto
        default-requeue-rejected: false
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://job-postgres:5432/freelancedb-jobs}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  mongodb:
    uri: ${SPRING_MONGODB_URI:mongodb://root:rootpass@mongo:27017/freelancemongo?authSource=admin}

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:redispass}

  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS:http://elasticsearch:9200}

  cache:
    type: redis
    redis:
      time-to-live: 600000

  jackson:
    mapper:
      accept-case-insensitive-enums: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:0123456789abcdef0123456789abcdef01234567}
  expiration: ${JWT_EXPIRATION_MS:86400000}

feign.user-service.url: http://user-service:8080
feign.job-service.url: http://job-service:8080
feign.proposal-service.url: http://proposal-service:8080
feign.contract-service.url: http://contract-service:8080
feign.wallet-service.url: http://wallet-service:8080

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true