services:
  user-postgres:
    image: postgres:17
    container_name: user-postgres
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: freelancedb-users
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./user-service/docker/postgres/init-user.sql:/docker-entrypoint-initdb.d/init-user.sql:ro
      - user-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d freelancedb-users"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  job-postgres:
    image: postgres:17
    container_name: job-postgres
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: freelancedb-jobs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./job-service/docker/postgres/init-job.sql:/docker-entrypoint-initdb.d/init-job.sql:ro
      - job-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d freelancedb-jobs"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  proposal-postgres:
    image: postgres:17
    container_name: proposal-postgres
    ports:
      - "5436:5432"
    environment:
      POSTGRES_DB: freelancedb-proposals
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./proposal-service/docker/postgres/init-proposal.sql:/docker-entrypoint-initdb.d/init-proposal.sql:ro
      - proposal-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d freelancedb-proposals"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  contract-postgres:
    image: postgres:17
    container_name: contract-postgres
    ports:
      - "5437:5432"
    environment:
      POSTGRES_DB: freelancedb-contracts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./contract-service/docker/postgres/init-contract.sql:/docker-entrypoint-initdb.d/init-contract.sql:ro
      - contract-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
  rabbitmq:
    image: rabbitmq:4.0-management
    container_name: freelance-rabbitmq
    user: "0:0"
    entrypoint: ["bash", "-c", "chown -R 999:999 /var/lib/rabbitmq && exec /usr/local/bin/docker-entrypoint.sh rabbitmq-server"]
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_ERLANG_COOKIE: freelancedev-cookie
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  mongo:
    image: mongo:latest
    container_name: freelance-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpass
      MONGO_INITDB_DATABASE: freelancemongo
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:2.9.8
    container_name: freelance-loki
    ports:
      - "3100:3100"
    volumes:
      - ./infra/docker/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s


  grafana:
    image: grafana/grafana:latest
    container_name: freelance-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./infra/docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/k8s/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  wallet-postgres:
    image: postgres:17
    container_name: wallet-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: freelancedb-wallet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./wallet-service/docker/postgres/init-wallet.sql:/docker-entrypoint-initdb.d/init-wallet.sql:ro
      - wallet-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d freelancedb-wallet"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  redis:
    image: redis:latest
    container_name: freelance-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass redispass --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redispass", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:9.0.3
    container_name: freelance-elasticsearch
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  neo4j:
    image: neo4j:latest
    container_name: freelance-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/neo4jpass
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  cassandra:
    image: cassandra:4.1
    container_name: freelance-cassandra
    ports:
      - "9042:9042"
    environment:
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
      JVM_OPTS: "-Xms512m -Xmx512m -XX:MaxDirectMemorySize=512m"
    volumes:
      - cassandra-data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s

  cassandra-init:
    image: cassandra:4.1
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./contract-service/docker/cassandra/init.cql:/init.cql
    command: >
      bash -c "cqlsh cassandra 9042 -f /init.cql"

  user-service:
    build: ./user-service
    ports:
      - "8081:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      user-postgres:
        condition: service_healthy
      mongo:
        condition: service_started
      redis:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-postgres:5432/freelancedb-users
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_MONGODB_URI: mongodb://root:rootpass@mongo:27017/freelancemongo?authSource=admin
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      JWT_SECRET: 0123456789abcdef0123456789abcdef01234567
      JWT_EXPIRATION_MS: 86400000

  job-service:
    build: ./job-service
    ports:
      - "8082:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      job-postgres:
        condition: service_healthy
      mongo:
        condition: service_started
      redis:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://job-postgres:5432/freelancedb-jobs
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      JWT_SECRET: 0123456789abcdef0123456789abcdef01234567
      JWT_EXPIRATION_MS: 86400000

  proposal-service:
    build: ./proposal-service
    ports:
      - "8083:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      proposal-postgres:
        condition: service_healthy
      mongo:
        condition: service_started
      redis:
        condition: service_started
      neo4j:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://proposal-postgres:5432/freelancedb-proposals
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      JWT_SECRET: 0123456789abcdef0123456789abcdef01234567
      JWT_EXPIRATION_MS: 86400000
      SPRING_DATA_MONGODB_URI: mongodb://root:rootpass@mongo:27017/freelancemongo?authSource=admin
      SPRING_MONGODB_URI: mongodb://root:rootpass@mongo:27017/freelancemongo?authSource=admin
      SPRING_NEO4J_URI: bolt://neo4j:7687
      SPRING_NEO4J_USERNAME: neo4j
      SPRING_NEO4J_PASSWORD: neo4jpass

  contract-service:
    build: ./contract-service
    ports:
      - "8084:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      contract-postgres:
        condition: service_healthy
      mongo:
        condition: service_started
      redis:
        condition: service_started
      cassandra:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://contract-postgres:5432/freelancedb-contracts
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_MONGODB_URI: mongodb://root:rootpass@mongo:27017/freelancemongo?authSource=admin
      SPRING_MONGODB_URI: mongodb://root:rootpass@mongo:27017/freelancemongo?authSource=admin
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: redispass
      SPRING_CASSANDRA_CONTACT_POINTS: cassandra
      SPRING_CASSANDRA_PORT: 9042
      SPRING_CASSANDRA_KEYSPACE_NAME: freelanceks
      SPRING_CASSANDRA_LOCAL_DATACENTER: datacenter1
      SPRING_CASSANDRA_REQUEST_TIMEOUT: 30s
      SPRING_CASSANDRA_SCHEMA_ACTION: CREATE_IF_NOT_EXISTS
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      JWT_SECRET: 0123456789abcdef0123456789abcdef01234567
      JWT_EXPIRATION_MS: 86400000

  wallet-service:
    build: ./wallet-service
    ports:
      - "8085:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      wallet-postgres:
        condition: service_healthy
      mongo:
        condition: service_started
      redis:
        condition: service_started
      loki:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://wallet-postgres:5432/freelancedb-wallet
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_MONGODB_URI: mongodb://root:rootpass@mongo:27017/freelancemongo?authSource=admin
      SPRING_MONGODB_URI: mongodb://root:rootpass@mongo:27017/freelancemongo?authSource=admin
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      JWT_SECRET: 0123456789abcdef0123456789abcdef01234567
      JWT_EXPIRATION_MS: 86400000

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    depends_on:
      user-service:
        condition: service_started
      job-service:
        condition: service_started
      proposal-service:
        condition: service_started
      contract-service:
        condition: service_started
      wallet-service:
        condition: service_started
    environment:
      JWT_SECRET: 0123456789abcdef0123456789abcdef01234567

volumes:
  user-pgdata:
  job-pgdata:
  proposal-pgdata:
  contract-pgdata:
  wallet-pgdata:
  loki-data:
  rabbitmq-data:
  mongo-data:
  es-data:
  neo4j-data:
  cassandra-data:
