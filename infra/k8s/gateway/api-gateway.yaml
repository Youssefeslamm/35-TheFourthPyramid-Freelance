apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: freelance/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: FEIGN_USER_SERVICE_URL
              value: http://user-service:8080
            - name: FEIGN_JOB_SERVICE_URL
              value: http://job-service:8080
            - name: FEIGN_PROPOSAL_SERVICE_URL
              value: http://proposal-service:8080
            - name: FEIGN_CONTRACT_SERVICE_URL
              value: http://contract-service:8080
            - name: FEIGN_WALLET_SERVICE_URL
              value: http://wallet-service:8080
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  labels:
    app: api-gateway
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
