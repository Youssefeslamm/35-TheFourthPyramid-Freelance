apiVersion: apps/v1
kind: Deployment
metadata:
  name: contract-service
  labels:
    app: contract-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: contract-service
  template:
    metadata:
      labels:
        app: contract-service
    spec:
      containers:
        - name: contract-service
          image: freelance/contract-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://contract-postgres:5432/freelancedb-contracts
            - name: SPRING_DATASOURCE_USERNAME
              value: postgres
            - name: SPRING_DATASOURCE_PASSWORD
              value: postgres
            - name: SPRING_RABBITMQ_HOST
              value: rabbitmq
            - name: SPRING_RABBITMQ_PORT
              value: "5672"
            - name: SPRING_RABBITMQ_USERNAME
              value: guest
            - name: SPRING_RABBITMQ_PASSWORD
              value: guest
            - name: FEIGN_USER_SERVICE_URL
              value: http://user-service:8080
            - name: FEIGN_JOB_SERVICE_URL
              value: http://job-service:8080
            - name: FEIGN_PROPOSAL_SERVICE_URL
              value: http://proposal-service:8080
            - name: FEIGN_CONTRACT_SERVICE_URL
              value: http://contract-service:8080
            - name: FEIGN_WALLET_SERVICE_URL
              value: http://wallet-service:8080
---
apiVersion: v1
kind: Service
metadata:
  name: contract-service
  labels:
    app: contract-service
spec:
  selector:
    app: contract-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
