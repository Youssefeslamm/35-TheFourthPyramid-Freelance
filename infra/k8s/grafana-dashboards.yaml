apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  labels:
    app: grafana
    grafana_dashboard: "1"
data:
  milestone3-overview.json: |
    {
      "title": "Freelance Marketplace Milestone 3",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "panels": [
        {
          "type": "timeseries",
          "title": "HTTP Requests Placeholder",
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count[5m])) by (application)"
            }
          ],
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 12,
            "h": 8
          }
        }
      ]
    }
