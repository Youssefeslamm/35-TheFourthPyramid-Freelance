apiVersion: v1
kind: ConfigMap
metadata:
  name: job-service-dashboard
  namespace: freelance
  labels:
    grafana_dashboard: "true"
data:
  job-service-dashboard.json: |
    {
      "title": "Job Service Logs",
      "uid": "job-service-logs",
      "schemaVersion": 38,
      "panels": [
        {
          "id": 1,
          "title": "All job-service logs (last 1h)",
          "type": "logs",
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 8 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "expr": "{service=\"job-service\"}",
              "legendFormat": ""
            }
          ]
        },
        {
          "id": 2,
          "title": "ERROR rate - job-service",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "expr": "rate({service=\"job-service\", level=\"ERROR\"}[5m])",
              "legendFormat": "errors/s"
            }
          ]
        },
        {
          "id": 3,
          "title": "ProposalSummary Feign call logs",
          "type": "logs",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "expr": "{service=\"job-service\"} |= \"ProposalSummary fetched\"",
              "legendFormat": ""
            }
          ]
        },
        {
          "id": 4,
          "title": "Feign fallback warning logs",
          "type": "logs",
          "gridPos": { "x": 0, "y": 16, "w": 24, "h": 8 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "expr": "{service=\"job-service\", level=\"WARN\"} |= \"ServiceClient\"",
              "legendFormat": ""
            }
          ]
        }
      ],
      "time": { "from": "now-1h", "to": "now" },
      "refresh": "30s"
    }