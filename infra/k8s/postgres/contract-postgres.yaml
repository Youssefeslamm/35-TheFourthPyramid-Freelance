# Phase H: POSTGRES_DB=freelancedb-contracts matches contract-service JDBC
# (services/contract-service.yaml → jdbc:postgresql://contract-postgres:5432/freelancedb-contracts).
# Governing Service is headless for StatefulSet stable identity (same pattern as sibling *-postgres.yaml).
---
apiVersion: v1
kind: Service
metadata:
  name: contract-postgres
  labels:
    app: contract-postgres
spec:
  clusterIP: None
  selector:
    app: contract-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: contract-postgres
  labels:
    app: contract-postgres
spec:
  serviceName: contract-postgres
  replicas: 1
  selector:
    matchLabels:
      app: contract-postgres
  template:
    metadata:
      labels:
        app: contract-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: freelancedb-contracts
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
