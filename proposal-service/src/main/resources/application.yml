spring:
  application:
    name: proposal-service

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        acknowledge-mode: auto
        default-requeue-rejected: false
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://proposal-postgres:5432/freelancedb-proposals}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  mongodb:
    uri: ${SPRING_MONGODB_URI:mongodb://root:rootpass@mongo:27017/freelancemongo?authSource=admin}

  data:
    redis:
      host: ${SPRING_REDIS_HOST:redis}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:redispass}
    neo4j:
      uri: ${SPRING_NEO4J_URI:bolt://neo4j:7687}
      username: ${SPRING_NEO4J_USERNAME:neo4j}
      password: ${SPRING_NEO4J_PASSWORD:neo4jpass}

  cache:
    type: redis
    redis:
      time-to-live: 600000

neo4j:
  uri: ${SPRING_NEO4J_URI:bolt://neo4j:7687}
  authentication:
    username: ${SPRING_NEO4J_USERNAME:neo4j}
    password: ${SPRING_NEO4J_PASSWORD:neo4jpass}

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:0123456789abcdef0123456789abcdef01234567}
  expiration: ${JWT_EXPIRATION_MS:86400000}

feign:
  user-service:
    url: ${FEIGN_USER_SERVICE_URL:http://user-service:8080}
  job-service:
    url: ${FEIGN_JOB_SERVICE_URL:http://job-service:8080}
  proposal-service:
    url: ${FEIGN_PROPOSAL_SERVICE_URL:http://proposal-service:8080}
  contract-service:
    url: ${FEIGN_CONTRACT_SERVICE_URL:http://contract-service:8080}
  wallet-service:
    url: ${FEIGN_WALLET_SERVICE_URL:http://wallet-service:8080}

loki:
  push-url: ${LOKI_PUSH_URL:http://loki:3100/loki/api/v1/push}
  env: ${LOKI_ENV:docker}

saga:
  payout:
    abandon-after: PT72H
    reaper-interval: PT15M

logging:
  level:
    root: INFO
    com.team35.freelance.proposal: DEBUG
    com.team35.freelance.proposal.service.ProposalService: DEBUG
    com.team35.freelance.proposal.messaging: DEBUG
    org.springframework.cloud.openfeign: DEBUG
    feign: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

management:
  server:
    port: 8080
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    tags:
      application: proposal-service
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
  health:
    rabbit:
      enabled: true
    db:
      enabled: true
    redis:
      enabled: true

---
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:postgresql://localhost:5432/freelancedb-proposals
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update

  rabbitmq:
    host: localhost

  mongodb:
    uri: mongodb://root:rootpass@localhost:27017/freelancemongo?authSource=admin

  data:
    neo4j:
      uri: bolt://localhost:7687
      username: neo4j
      password: neo4jpass
    redis:
      host: localhost
      port: 6379
      password: redispass

neo4j:
  uri: bolt://localhost:7687
  authentication:
    username: neo4j
    password: neo4jpass