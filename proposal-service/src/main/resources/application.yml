spring:
  application:
    name: proposal-service

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        acknowledge-mode: auto
        default-requeue-rejected: false
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://proposal-postgres:5432/freelancedb-proposals}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://root:rootpass@mongo:27017/freelancemongo?authSource=admin}
    redis:
      host: ${SPRING_REDIS_HOST:redis}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:redispass}
    neo4j:
      uri: ${SPRING_NEO4J_URI:bolt://neo4j:7687}
      username: ${SPRING_NEO4J_USERNAME:neo4j}
      password: ${SPRING_NEO4J_PASSWORD:neo4jpass}

  cache:
    type: redis
    redis:
      time-to-live: 600000

neo4j:
  uri: ${SPRING_NEO4J_URI:bolt://neo4j:7687}
  authentication:
    username: ${SPRING_NEO4J_USERNAME:neo4j}
    password: ${SPRING_NEO4J_PASSWORD:neo4jpass}

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:0123456789abcdef0123456789abcdef01234567}
  expiration: ${JWT_EXPIRATION_MS:86400000}

feign.user-service.url: http://user-service:8080
feign.job-service.url: http://job-service:8080
feign.proposal-service.url: http://proposal-service:8080
feign.contract-service.url: http://contract-service:8080
feign.wallet-service.url: http://wallet-service:8080


---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/freelancedb-proposals
  jpa:
    hibernate:
      ddl-auto: update
  data:
    neo4j:
      uri: bolt://localhost:7687
    mongodb:
      uri: mongodb://root:rootpass@localhost:27017/freelancemongo?authSource=admin
    redis:
      host: localhost