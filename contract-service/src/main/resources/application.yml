spring:
  application:
    # Loki / dashboards: label service=${spring.application.name}
    name: contract-service

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        acknowledge-mode: auto
        default-requeue-rejected: false
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://contract-postgres:5432/freelancedb-contracts}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  mongodb:
    uri: ${SPRING_MONGODB_URI:mongodb://root:rootpass@mongo:27017/freelancemongo?authSource=admin}

  data:
    redis:
      host: ${SPRING_REDIS_HOST:redis}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:redispass}

  cassandra:
    contact-points: ${SPRING_CASSANDRA_CONTACT_POINTS:cassandra}
    port: ${SPRING_CASSANDRA_PORT:9042}
    keyspace-name: ${SPRING_CASSANDRA_KEYSPACE_NAME:freelanceks}
    local-datacenter: ${SPRING_CASSANDRA_LOCAL_DATACENTER:datacenter1}
    schema-action: CREATE_IF_NOT_EXISTS

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:0123456789abcdef0123456789abcdef01234567}
  expiration: ${JWT_EXPIRATION_MS:86400000}

cache:
  type: redis
  redis:
    time-to-live: 600000

feign:
  user-service:
    url: ${FEIGN_USER_SERVICE_URL:http://user-service:8080}
  job-service:
    url: ${FEIGN_JOB_SERVICE_URL:http://job-service:8080}
  proposal-service:
    url: ${FEIGN_PROPOSAL_SERVICE_URL:http://proposal-service:8080}
  contract-service:
    url: ${FEIGN_CONTRACT_SERVICE_URL:http://contract-service:8080}
  wallet-service:
    url: ${FEIGN_WALLET_SERVICE_URL:http://wallet-service:8080}

loki:
  push-url: ${LOKI_PUSH_URL:http://loki:3100/loki/api/v1/push}

management:
  endpoints:
    web:
      exposure:
        include: prometheus,health,info,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
    tags:
      application: contract-service

---
spring:
  config:
    activate:
      on-profile: prod,k8s
loki:
  push-url: ${LOKI_PUSH_URL:http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push}
