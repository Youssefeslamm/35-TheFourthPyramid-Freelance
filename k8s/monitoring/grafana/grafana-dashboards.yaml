  contract-dashboard.json: "{\r\n  \"title\": \"Contract Service Dashboard\",\r\n
    \ \"tags\": [\"freelance\", \"contract-service\"],\r\n  \"timezone\": \"browser\",\r\n
    \ \"schemaVersion\": 39,\r\n  \"version\": 1,\r\n  \"panels\": [\r\n    {\r\n
    \     \"type\": \"timeseries\",\r\n      \"title\": \"LogQL Error Rate\",\r\n
    \     \"targets\": [{ \"expr\": \"sum(count_over_time({service=\\\"contract-service\\\",
    level=\\\"ERROR\\\"}[1m]))\", \"legendFormat\": \"errors/min\" }],\r\n      \"gridPos\":
    { \"h\": 8, \"w\": 8, \"x\": 0, \"y\": 0 }\r\n    },\r\n    {\r\n      \"type\":
    \"logs\",\r\n      \"title\": \"LogQL Correlation Trace\",\r\n      \"targets\":
    [{ \"expr\": \"{service=\\\"contract-service\\\"} | json | correlationId=~\\\".+\\\"\",
    \"legendFormat\": \"trace\" }],\r\n      \"gridPos\": { \"h\": 8, \"w\": 8, \"x\":
    8, \"y\": 0 }\r\n    },\r\n    {\r\n      \"type\": \"timeseries\",\r\n      \"title\":
    \"LogQL RabbitMQ Audit\",\r\n      \"targets\": [\r\n        { \"expr\": \"sum(count_over_time({service=\\\"contract-service\\\"}
    |= \\\"Published\\\" [5m]))\", \"legendFormat\": \"published\" },\r\n        {
    \"expr\": \"sum(count_over_time({service=\\\"contract-service\\\"} |= \\\"Consuming\\\"
    [5m]))\", \"legendFormat\": \"consumed\" }\r\n      ],\r\n      \"gridPos\": {
    \"h\": 8, \"w\": 8, \"x\": 16, \"y\": 0 }\r\n    },\r\n    {\r\n      \"type\":
    \"timeseries\",\r\n      \"title\": \"PromQL HTTP Request Rate\",\r\n      \"targets\":
    [{ \"expr\": \"sum(rate(http_server_requests_seconds_count{job=\\\"contract-service\\\"}[5m]))
    by (uri)\", \"legendFormat\": \"{{uri}}\" }],\r\n      \"gridPos\": { \"h\": 8,
    \"w\": 12, \"x\": 0, \"y\": 8 }\r\n    },\r\n    {\r\n      \"type\": \"timeseries\",\r\n
    \     \"title\": \"PromQL HTTP P99 Latency\",\r\n      \"targets\": [{ \"expr\":
    \"histogram_quantile(0.99, sum(rate(http_server_requests_seconds_bucket{job=\\\"contract-service\\\"}[5m]))
    by (le, uri))\", \"legendFormat\": \"P99 {{uri}}\" }],\r\n      \"gridPos\": {
    \"h\": 8, \"w\": 12, \"x\": 12, \"y\": 8 }\r\n    },\r\n    {\r\n      \"type\":
    \"timeseries\",\r\n      \"title\": \"PromQL JVM Heap\",\r\n      \"targets\":
    [{ \"expr\": \"jvm_memory_used_bytes{job=\\\"contract-service\\\", area=\\\"heap\\\"}\",
    \"legendFormat\": \"heap\" }],\r\n      \"gridPos\": { \"h\": 8, \"w\": 12, \"x\":
    0, \"y\": 16 }\r\n    }\r\n  ]\r\n}\r\n"
