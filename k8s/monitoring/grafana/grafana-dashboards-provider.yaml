apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: monitoring
  labels:
    app: grafana
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: freelance-marketplace
        orgId: 1
        folder: Freelance
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
